interfaces {
    et-0/0/0 {
        description "to spine1 Ethernet4";
        unit 0 {
            family inet {
                unnumbered-address lo0.0;
            }
            family inet6;
        }
    }
    et-0/0/1 {
        description "to spine2 Ethernet4";
        unit 0 {
            family inet {
                unnumbered-address lo0.0;
            }
            family inet6;
        }
    }
    et-0/0/2 {
        description "client vlan100";
        unit 0 {
            family ethernet-switching {
                interface-mode access;
                vlan {
                    members VLAN100;
                }
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.255.0.4/32;
            }
        }
    }
    re0:mgmt-0 {
        unit 0 {
            family inet {
                address 172.20.20.104/24;
            }
        }
    }
}
forwarding-options {
    tunnel-termination;
}
policy-options {
    policy-statement LOOPBACK {
        term 10 {
            from {
                route-filter 10.255.0.4/32 exact;
            }
            then accept;
        }
        then reject;
    }
    as-list UNDERLAY-AS members [ 65101 65102 ];
}
routing-instances {
    EVPN100 {
        instance-type mac-vrf;
        protocols {
            evpn {
                encapsulation vxlan;
                extended-vni-list 10100;
                multicast-mode ingress-replication;
            }
        }
        vtep-source-interface lo0.0;
        service-type vlan-based;
        interface et-0/0/2.0;
        route-distinguisher 10.255.0.4:10100;
        vrf-target target:10100:10100;
        vlans {
            VLAN100 {
                vlan-id 100;
                vxlan {
                    vni 10100;
                }
            }
        }
    }
}
routing-options {
    router-id 10.255.0.4;
    autonomous-system 65000;
}
protocols {
    router-advertisement {
        interface et-0/0/0.0;
        interface et-0/0/1.0;
    }
    bgp {
        group UNDERLAY {
            type external;
            family inet {
                unicast {
                    extended-nexthop;
                }
            }
            export LOOPBACK;
            local-as 65004;
            multipath {
                multiple-as;
            }
            dynamic-neighbor FABRIC {
                peer-auto-discovery {
                    family inet6 {
                        ipv6-nd;
                    }
                    interface et-0/0/0.0;
                    interface et-0/0/1.0;
                }
            }
            peer-as-list UNDERLAY-AS;
        }
        group EVPN {
            type internal;
            local-address 10.255.0.4;
            family evpn {
                signaling;
            }
            neighbor 10.255.0.101 {
                peer-as 65000;
            }
            neighbor 10.255.0.102 {
                peer-as 65000;
            }
        }
    }
}