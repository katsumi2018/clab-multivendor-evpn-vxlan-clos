interfaces {
    bridge br0 {
        enable-vlan
        member {
            interface eth3 {
                native-vlan "100"
            }
            interface vxlan0 {
            }
        }
    }
    ethernet eth1 {
        description "to spine1 Ethernet1"
        offload {
            gso
            sg
        }
    }
    ethernet eth2 {
        description "to spine2 Ethernet1"
        offload {
            gso
            sg
        }
    }
    ethernet eth3 {
        description "client vlan100"
        offload {
            gso
            sg
        }
    }
    loopback lo {
        address "10.255.0.1/32"
    }
    vxlan vxlan0 {
        parameters {
            external
        }
        source-interface "lo"
        vlan-to-vni 100 {
            vni "10100"
        }
    }
}
protocols {
    bgp {
        address-family {
            ipv4-unicast {
                maximum-paths {
                    ebgp "8"
                }
                network 10.255.0.1/32 {
                }
            }
            l2vpn-evpn {
                advertise-all-vni
                vni 10100 {
                    route-target {
                        both "10100:10100"
                    }
                }
            }
        }
        neighbor 10.255.0.101 {
            address-family {
                l2vpn-evpn {
                }
            }
            remote-as "65000"
            update-source "lo"
        }
        neighbor 10.255.0.102 {
            address-family {
                l2vpn-evpn {
                }
            }
            remote-as "65000"
            update-source "lo"
        }
        neighbor eth1 {
            interface {
                peer-group "SPINE1-UNDERLAY"
            }
        }
        neighbor eth2 {
            interface {
                peer-group "SPINE2-UNDERLAY"
            }
        }
        parameters {
            router-id "10.255.0.1"
        }
        peer-group SPINE1-UNDERLAY {
            address-family {
                ipv4-unicast {
                }
            }
            local-as 65001 {
                no-prepend {
                    replace-as
                }
            }
            remote-as "65101"
        }
        peer-group SPINE2-UNDERLAY {
            address-family {
                ipv4-unicast {
                }
            }
            local-as 65001 {
                no-prepend {
                    replace-as
                }
            }
            remote-as "65102"
        }
        system-as "65000"
    }
}
service {
    ssh {
        listen-address "0.0.0.0"
    }
}
system {
    config-management {
        commit-revisions "100"
    }
    console {
        device ttyS0 {
            speed "115200"
        }
    }
    host-name "leaf1"
    login {
        user admin {
            authentication {
                encrypted-password "$6$rounds=656000$FMq5TfVE2/YPu5cs$m14t0Gn1.4SuLPBy1l8OITanrWBA63aZIMDqAACnz91MQWr5KzfJtywoDWKOsg1AFil.8pqBmX1un00yYCOFf0"
                public-keys clab {
                    key "AAAAC3NzaC1lZDI1NTE5AAAAICX1AgzRrUL6N/ZaxhdWsr+a206TA8tiYe42qHFx1ur3"
                    type "ssh-ed25519"
                }
            }
        }
    }
    syslog {
        local {
            facility all {
                level "info"
            }
            facility local7 {
                level "debug"
            }
        }
    }
}


