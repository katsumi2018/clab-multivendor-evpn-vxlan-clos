hostname leaf2
!
spanning-tree mode none
!
ip routing
ipv6 unicast-routing
!
vlan 100
   name CLIENT_VLAN100
!
interface Ethernet1
   description to spine1 Ethernet2
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Ethernet2
   description to spine2 Ethernet2
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Ethernet3
   description client vlan100
   switchport access vlan 100
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Management0
   ip address 172.20.20.102/24
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
!
!
router bgp 65000
   router-id 10.255.0.2
   no bgp default ipv4-unicast
   maximum-paths 8
   neighbor EVPN peer group
   neighbor EVPN update-source Loopback0
   neighbor EVPN send-community extended
   neighbor SPINE-UNDERLAY peer group
   neighbor SPINE-UNDERLAY local-as 65002 no-prepend replace-as
   neighbor SPINE-UNDERLAY send-community
   neighbor 10.255.0.101 peer group EVPN
   neighbor 10.255.0.101 remote-as 65000
   neighbor 10.255.0.102 peer group EVPN
   neighbor 10.255.0.102 remote-as 65000
   neighbor interface Ethernet1 peer-group SPINE-UNDERLAY remote-as 65101
   neighbor interface Ethernet2 peer-group SPINE-UNDERLAY remote-as 65102
   !
   vlan 100
      rd 10.255.0.2:10100
      route-target import 10100:10100
      route-target export 10100:10100
      redistribute learned
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      bgp next-hop address-family ipv6
      neighbor SPINE-UNDERLAY activate
      neighbor SPINE-UNDERLAY next-hop address-family ipv6 originate
      network 10.255.0.2/32
!
username admin privilege 15 secret admin
!
end