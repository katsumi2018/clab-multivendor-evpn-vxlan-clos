hostname spine2
!
spanning-tree mode none
!
ip routing
ipv6 unicast-routing
!
!
interface Ethernet1
   description to leaf1 vyos Ethernet2
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Ethernet2
   description to leaf2 ceos Ethernet2
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Ethernet3
   description to leaf3 sonic Ethernet4
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Ethernet4
   description to leaf4 cjunosevo et-0/0/1
   no switchport
   ip address unnumbered Loopback0
   ipv6 enable
!
interface Loopback0
   ip address 10.255.0.102/32
!
!
router bgp 65000
   router-id 10.255.0.102
   maximum-paths 8
   neighbor EVPN peer group
   neighbor EVPN update-source Loopback0
   neighbor EVPN route-reflector-client
   neighbor EVPN send-community extended
   neighbor LEAF-UNDERLAY peer group
   neighbor LEAF-UNDERLAY local-as 65102 no-prepend replace-as
   neighbor LEAF-UNDERLAY send-community
   neighbor 10.255.0.1 peer group EVPN
   neighbor 10.255.0.1 remote-as 65000
   neighbor 10.255.0.2 peer group EVPN
   neighbor 10.255.0.2 remote-as 65000
   neighbor 10.255.0.3 peer group EVPN
   neighbor 10.255.0.3 remote-as 65000
   neighbor 10.255.0.4 peer group EVPN
   neighbor 10.255.0.4 remote-as 65000
   neighbor interface Ethernet1 peer-group LEAF-UNDERLAY remote-as 65001
   neighbor interface Ethernet2 peer-group LEAF-UNDERLAY remote-as 65002
   neighbor interface Ethernet3 peer-group LEAF-UNDERLAY remote-as 65003
   neighbor interface Ethernet4 peer-group LEAF-UNDERLAY remote-as 65004
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      bgp next-hop address-family ipv6
      neighbor LEAF-UNDERLAY activate
      neighbor LEAF-UNDERLAY next-hop address-family ipv6 originate
      no neighbor 10.255.0.1 activate
      no neighbor 10.255.0.2 activate
      no neighbor 10.255.0.3 activate
      no neighbor 10.255.0.4 activate
      network 10.255.0.102/32
!
username admin privilege 15 secret admin
!
end