!
route-map ALLOW_ALL permit 10
exit
!
router bgp 65000
 bgp router-id 10.255.0.3
 no bgp default ipv4-unicast
 neighbor EVPN peer-group
 neighbor EVPN update-source Loopback0
 neighbor SPINE-UNDERLAY peer-group
 neighbor SPINE-UNDERLAY local-as 65003 no-prepend replace-as
 neighbor SPINE-UNDERLAY capability extended-nexthop
 neighbor 10.255.0.101 remote-as 65000
 neighbor 10.255.0.101 peer-group EVPN
 neighbor 10.255.0.102 remote-as 65000
 neighbor 10.255.0.102 peer-group EVPN
 neighbor Ethernet0 interface peer-group SPINE-UNDERLAY
 neighbor Ethernet0 remote-as 65101
 neighbor Ethernet4 interface peer-group SPINE-UNDERLAY
 neighbor Ethernet4 remote-as 65102
 !
 address-family ipv4 unicast
  network 10.255.0.3/32
  neighbor SPINE-UNDERLAY activate
  neighbor SPINE-UNDERLAY route-map ALLOW_ALL in
  neighbor SPINE-UNDERLAY route-map ALLOW_ALL out
  maximum-paths 8
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN activate
  advertise-all-vni
  vni 10100
   rd 10.255.0.3:10100
   route-target import 10100:10100
   route-target export 10100:10100
  exit-vni
 exit-address-family
exit
!
no ip nht resolve-via-default
!
no ipv6 nht resolve-via-default
!
